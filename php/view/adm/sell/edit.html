<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta content="webkit|ie-comp|ie-stand" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport"/>
    <link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/>
    <link href="/static/Hui-iconfont/1.0.8/iconfont.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/skin/default/skin.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/style.css" rel="stylesheet" type="text/css"/>
    <script src="/static/laydate/laydate.js" type="text/javascript"></script>
    <style>
        .preview-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; min-height: 80px; }
        .preview-item { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 2px solid #ddd; }
        .preview-item img { width: 100%; height: 120px; object-fit: cover; }
        .preview-overlay { position: absolute; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; }
        .preview-item:hover .preview-overlay { display: flex; }
        .delete-btn { width: 30px; height: 30px; border-radius: 50%; background: #e74c3c; color: #fff; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 18px; }
    </style>
    <title>贩售修改</title>
</head>
<body>
<nav class="breadcrumb">
    <i class="Hui-iconfont">&#xe67f;</i> 首页 <span class="c-gray en">&gt;</span> 贩售管理 <span class="c-gray en">&gt;</span> 修改
    <a class="btn btn-success radius r" href="javascript:location.replace(location.href);" style="line-height:1.6em;margin-top:3px" title="刷新"><i class="Hui-iconfont">&#xe68f;</i></a>
</nav>
<div class="page-container">
    <form class="form form-horizontal" id="editForm">
        <input type="hidden" name="id" id="id" value="{$info.id}">
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">商品ID：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="productId" name="productId" type="number" value="{$info.productId}" placeholder="对应 mp_product.id">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">宣传图：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <button type="button" class="btn btn-primary radius" onclick="openGalleryModal('promoImages')">选择图库</button>
                <div class="preview-container" id="promoImagesPreview"></div>
                <input type="hidden" id="promoImages" name="promoImages" value="">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">预定须知图：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <button type="button" class="btn btn-primary radius" onclick="openGalleryModal('reservationNotice')">选择图库</button>
                <div class="preview-container" id="reservationNoticePreview"></div>
                <input type="hidden" id="reservationNotice" name="reservationNotice" value="">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">是否上架：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <span class="select-box">
                    <select class="select" id="status" name="status">
                        {foreach name="statusType" key="k" item="v"}
                        <option value="{$k}" {if $info.status == $k} selected {/if}>{$v}</option>
                        {/foreach}
                    </select>
                </span>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">开始时间：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="startTime" name="startTime" type="text" value="{$info.startTime}" onclick="laydate({istime:true,format:'YYYY-MM-DD hh:mm:ss'})">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">结束时间：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="endTime" name="endTime" type="text" value="{$info.endTime}" onclick="laydate({istime:true,format:'YYYY-MM-DD hh:mm:ss'})">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">排序：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="sort" name="sort" type="number" value="{$info.sort}"> 数字越大越靠前
            </div>
        </div>
        <div class="row cl">
            <div class="col-9 col-offset-3">
                <input class="btn btn-primary radius" id="submitBtn" type="button" value="提交">
            </div>
        </div>
    </form>
</div>
<script src="/static/js/jquery.min.js"></script>
<script src="/static/layer/2.4/layer.js"></script>
<script src="/static/h-ui/js/H-ui.min.js"></script>
<script src="/static/h-ui.admin/js/H-ui.admin.js"></script>
{include file="public/gallery_selector" /}
<script>
    var selectedImages = { promoImages: [], reservationNotice: [] };

    function openGalleryModal(type) {
        var cur = selectedImages[type] || [];
        GallerySelector.init({ multiple: true, maxSelect: 0, selectedImages: cur });
        GallerySelector.open(function(imgs) {
            selectedImages[type] = imgs;
            var urls = imgs.map(function(i) { return i.url; });
            $('#' + type).val(JSON.stringify(urls));
            updatePreview(type);
        });
    }

    function updatePreview(type) {
        var list = selectedImages[type] || [];
        var id = type + 'Preview';
        var html = '';
        for (var i = 0; i < list.length; i++) {
            var it = list[i];
            html += '<div class="preview-item" data-id="' + it.id + '">';
            html += '<img src="' + it.url + '" alt="">';
            html += '<div class="preview-overlay"><div class="delete-btn" onclick="removeImg(\'' + type + '\',\'' + it.id + '\')">×</div></div></div>';
        }
        $('#' + id).html(html);
    }

    function removeImg(type, id) {
        var list = selectedImages[type] || [];
        for (var i = 0; i < list.length; i++) {
            if (String(list[i].id) === String(id)) { list.splice(i, 1); break; }
        }
        var urls = list.map(function(i) { return i.url; });
        $('#' + type).val(JSON.stringify(urls));
        updatePreview(type);
    }

    $(function() {
        // 初始化已选择的宣传图
        {if isset($info.promoImagesArrayJson) && $info.promoImagesArrayJson}
        try {
            selectedImages.promoImages = {$info.promoImagesArrayJson|raw};
            updatePreview('promoImages');
            // 同步到hidden字段
            var promoUrls = selectedImages.promoImages.map(function(i) { return i.url; });
            $('#promoImages').val(JSON.stringify(promoUrls));
        } catch(e) {
            console.error('解析宣传图数据失败', e);
        }
        {/if}
        
        // 初始化已选择的预定须知图
        {if isset($info.reservationNoticeArrayJson) && $info.reservationNoticeArrayJson}
        try {
            selectedImages.reservationNotice = {$info.reservationNoticeArrayJson|raw};
            updatePreview('reservationNotice');
            // 同步到hidden字段
            var noticeUrls = selectedImages.reservationNotice.map(function(i) { return i.url; });
            $('#reservationNotice').val(JSON.stringify(noticeUrls));
        } catch(e) {
            console.error('解析预定须知图数据失败', e);
        }
        {/if}
        $('#submitBtn').click(function() {
            var productId = $('#productId').val().trim();
            if (!productId) {
                layer.msg('请填写商品ID');
                return;
            }
            var loadIndex = layer.load(1, { shade: [0.1, '#000'] });
            $.ajax({
                type: 'POST',
                url: '/adm/sell/edit',
                data: $('#editForm').serializeArray(),
                dataType: 'json',
                success: function(data) {
                    layer.close(loadIndex);
                    layer.msg(data.msg, { time: 1000 }, function() {
                        if (data.code == 1) {
                            layer.msg(data.msg, {time: 1000}, function () {
                                window.parent.location.reload();
                                layer_close();
                            });
                        } else {
                            layer.msg(data.msg, {time: 1000});
                            return false;
                        }
                    });
                },
                error: function() {
                    layer.close(loadIndex);
                    layer.msg('请求失败');
                }
            });
        });
    });
</script>
</body>
</html>
