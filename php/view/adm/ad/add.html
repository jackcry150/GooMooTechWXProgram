<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta content="webkit|ie-comp|ie-stand" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport"/>
    <link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/>
    <link href="/static/Hui-iconfont/1.0.8/iconfont.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/skin/default/skin.css" id="skin" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/style.css" rel="stylesheet" type="text/css"/>
    <title>添加</title>
</head>
<body>
<div class="page-container">
    <form class="form form-horizontal" id="addForm">
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">位置：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <span class="select-box">
				<select class="select" data-verify="选择位置" id="type" name="type">
					<option value="">选择位置</option>
                    {foreach name="adType" key="k" item="v"}
                    <option value="{$k}">{$v}</option>
                {/foreach}
				</select>
				</span>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">标题：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="标题不能为空" id="title" name="title" type="text" value="">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">图片：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <button type="button" class="btn btn-primary radius" onclick="openGalleryModal()">选择图片</button>
                <div class="preview-container" id="imagePreview" style="margin-top:10px;"></div>
                <input type="hidden" id="image" name="image" data-verify="图片不能为空">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">地址：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="地址不能为空" id="link" name="link" placeholder="/page" type="text" value="">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">状态：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <span class="select-box">
				<select class="select" data-verify="选择状态" id="status" name="status">
                    {foreach name="statusType" key="k" item="v"}
                    <option value="{$k}">{$v}</option>
                {/foreach}
				</select>
				</span>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">排序：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="排序不能为空" id="sort" name="sort" type="number" value="1">
                数字越大越靠前
            </div>
        </div>
        <div class="row cl">
            <div class="col-9 col-offset-3">
                <input class="btn btn-primary radius" id="add" type="button" value="&nbsp;&nbsp;提交&nbsp;&nbsp;">
            </div>
        </div>
    </form>
</div>
<!-- 引入图库选择器 -->
{include file="public/gallery_selector" /}
<!--_footer 作为公共模版分离出去-->
<script src="/static/js/jquery.min.js" type="text/javascript"></script>
<script src="/static/layer/2.4/layer.js" type="text/javascript"></script>
<script src="/static/h-ui/js/H-ui.min.js" type="text/javascript"></script>
<script src="/static/h-ui.admin/js/H-ui.admin.js" type="text/javascript"></script>
<!--/_footer 作为公共模版分离出去-->

<!--请在下方写此页面业务相关的脚本-->
<script type="text/javascript">
    // 选中的图片
    var selectedImage = null;
    
    // 初始化图库选择器
    $(function () {
        GallerySelector.init({
            multiple: false // 单选模式
        });
    });
    
    // 打开图库选择器
    function openGalleryModal() {
        GallerySelector.open(function(images) {
            if (images && images.length > 0) {
                selectedImage = images[0];
                updateImagePreview();
            }
        });
    }
    
    // 更新图片预览
    function updateImagePreview() {
        if (selectedImage) {
            $('#image').val(selectedImage.url);
            var previewHtml = '<div style="position:relative;display:inline-block;margin-top:10px;">';
            previewHtml += '<img src="' + selectedImage.url + '" style="max-width:200px;max-height:200px;border:1px solid #ddd;border-radius:4px;">';
            previewHtml += '<span style="position:absolute;top:-8px;right:-8px;background:#ff0000;color:#fff;border-radius:50%;width:20px;height:20px;line-height:20px;text-align:center;cursor:pointer;font-size:14px;" onclick="removeImage()" title="删除">×</span>';
            previewHtml += '</div>';
            $('#imagePreview').html(previewHtml);
        } else {
            $('#image').val('');
            $('#imagePreview').html('');
        }
    }
    
    // 删除图片
    function removeImage() {
        selectedImage = null;
        updateImagePreview();
    }
    
    $(function () {
        $('#add').click(function () {
            const content = $("#addForm").serializeArray();
            let flag = 0;
            
            // 验证图片选择
            if (!$('#image').val()) {
                layer.msg('请选择图片', {time: 1000});
                flag = 1;
                return false;
            }
            
            $.each(content, function (i, item) {
                let id = $('#' + content[i].name);
                let verify = id.data("verify");
                if (item['value'] == '' && verify != '') {
                    layer.msg(verify, {time: 1000});
                    id.focus();
                    flag = 1;
                    return false;
                } else {
                    flag = 0;
                }
            });
            if (!flag) {
                $.ajax({
                    type: 'POST',
                    url: '/adm/ad/add',
                    data: content,
                    dataType: 'json',
                    success: function (data) {
                        if (data.code == 1) {
                            layer.msg(data.msg, {time: 1000}, function () {
                                window.parent.location.reload();
                                layer_close();
                            });
                        } else {
                            layer.msg(data.msg, {time: 1000});
                            return false;
                        }
                    }
                });
                return false;
            }
        });
    });
</script>
<!--/请在上方写此页面业务相关的脚本-->
</body>
</html>
