<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta content="webkit|ie-comp|ie-stand" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport"/>
    <link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/>
    <link href="/static/Hui-iconfont/1.0.8/iconfont.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/skin/default/skin.css" id="skin" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/style.css" rel="stylesheet" type="text/css"/>
    {include file="public/gallery_selector" /}
    <style>
        .preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 10px;
        }

        .preview-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .preview-item2 {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .preview-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .preview-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
        }

        .preview-item:hover .preview-overlay {
            opacity: 1;
        }

        .action-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
        }

        .delete-btn {
            background: #e74c3c;
        }
    </style>
    <title>修改</title>
</head>
<body>
<div class="page-container">
    <form class="form form-horizontal" id="editForm">
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="title">标题：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="标题不能为空" id="title" name="title" type="text" value="{$info.title}">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">封面图：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <button type="button" class="btn btn-primary radius" onclick="openCoverGalleryModal()">选择封面图</button>
                <div class="preview-container" id="previewContainer"></div>
                <input data-verify="主图不能为空" id="image" name="image" type="hidden" value="{$info.image}"/>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="labels">标签：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="标签不能为空" id="labels" name="labels" type="text" value="{$info.labels}">
                多个标签使用英文（,）隔开
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="proportion">比例：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="比例不能为空" id="proportion" name="proportion" type="text" value="{$info.proportion}">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="size">尺寸：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="尺寸不能为空" id="size" name="size" type="text" value="{$info.size}">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="material">材质：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="材质不能为空" id="material" name="material" type="text" value="{$info.material}">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="copyright">版权所属：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="版权所属不能为空" id="copyright" name="copyright" type="text" value="{$info.copyright}">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="price">售价：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="售价不能为空" id="price" name="price" type="text" value="{$info.price}">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="content">内容物及配件：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="内容物及配件不能为空" id="content" name="content" type="text" value="{$info.content}">
                多个内容物及配件使用英文（,）隔开
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">图片：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <button type="button" class="btn btn-primary radius" onclick="openContentGalleryModal()">选择图片</button>
                <div class="preview-container" id="contentImages"></div>
                <input data-verify="图片不能为空" id="images" name="images" type="hidden" value="{$info.images}"/>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="status">状态：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <span class="select-box">
				<select class="select" data-verify="选择状态" id="status" name="status">
                    {foreach name="statusType" key="k" item="v"}
                    <option $info.status== $k} selected value="{$k}" { {if/if} >{$v}</option>
                    {/foreach}
				</select>
				</span>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="sort">排序：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="排序不能为空" id="sort" name="sort" type="number" value="{$info.sort}">
                数字越大越靠前
            </div>
        </div>
        <div class="row cl">
            <div class="col-9 col-offset-3">
                <input name="id" type="hidden" value="{$info.id}"/>
                <input class="btn btn-primary radius" id="edit" type="button" value="&nbsp;&nbsp;提交&nbsp;&nbsp;">
            </div>
        </div>
    </form>
</div>
<!--_footer 作为公共模版分离出去-->
<script src="/static/js/jquery.min.js" type="text/javascript"></script>
<script src="/static/layer/2.4/layer.js" type="text/javascript"></script>
<script src="/static/h-ui/js/H-ui.min.js" type="text/javascript"></script>
<script src="/static/h-ui.admin/js/H-ui.admin.js" type="text/javascript"></script>
<!--/_footer 作为公共模版分离出去-->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!--请在下方写此页面业务相关的脚本-->
<script type="text/javascript">
    var coverImages = [];
    var contentImages = [];

    $(function () {
        // 加载已有的封面图
        function loadCoverImages() {
            var imgJson = $('#image').val();
            if (imgJson) {
                try {
                    var img = JSON.parse(imgJson);
                    if (img && img.length > 0) {
                        coverImages = [{
                            id: Date.now(),
                            url: img[0],
                            name: '封面图'
                        }];
                        updateCoverPreview();
                    }
                } catch(e) {
                    console.error('解析封面图失败', e);
                }
            }
        }
        
        // 加载已有的内容图
        function loadContentImages() {
            var imgJson = $('#images').val();
            if (imgJson) {
                try {
                    var img = JSON.parse(imgJson);
                    if (img && img.length > 0) {
                        contentImages = [];
                        for (var i = 0; i < img.length; i++) {
                            contentImages.push({
                                id: Date.now() + i,
                                url: img[i],
                                name: '图片' + (i + 1)
                            });
                        }
                        updateContentPreview();
                    }
                } catch(e) {
                    console.error('解析内容图失败', e);
                }
            }
        }
        
        // 初始化加载已有图片
        loadCoverImages();
        loadContentImages();
        
        // 打开封面图选择（单选）
        window.openCoverGalleryModal = function() {
            GallerySelector.init({
                multiple: false,
                selectedImages: coverImages
            });
            GallerySelector.open(function(selectedImages) {
                coverImages = selectedImages;
                updateCoverPreview();
            });
        };
        
        // 打开内容图选择（多选）
        window.openContentGalleryModal = function() {
            GallerySelector.init({
                multiple: true,
                maxSelect: 0,
                selectedImages: contentImages
            });
            GallerySelector.open(function(selectedImages) {
                contentImages = selectedImages;
                updateContentPreview();
            });
        };
        
        // 更新封面图预览
        function updateCoverPreview() {
            var html = '';
            if (coverImages.length > 0) {
                var img = coverImages[0];
                html += '<div class="preview-item" data-id="' + img.id + '">';
                html += '<img src="' + img.url + '" class="preview-img" alt="' + img.name + '">';
                html += '<div class="preview-overlay">';
                html += '<div class="action-btn delete-btn" onclick="removeCoverImage()" title="删除图片"><i class="Hui-iconfont">&#xe6e2;</i></div>';
                html += '</div>';
                html += '</div>';
                $('#image').val(JSON.stringify([img.url]));
            } else {
                $('#image').val('');
            }
            $('#previewContainer').html(html);
        }
        
        // 更新内容图预览
        function updateContentPreview() {
            var html = '';
            var urls = [];
            for (var i = 0; i < contentImages.length; i++) {
                var img = contentImages[i];
                urls.push(img.url);
                html += '<div class="preview-item2" data-id="' + img.id + '">';
                html += '<img src="' + img.url + '" class="preview-img" alt="' + img.name + '">';
                html += '<div class="preview-overlay">';
                html += '<div class="action-btn delete-btn" onclick="removeContentImage(' + img.id + ')" title="删除图片"><i class="Hui-iconfont">&#xe6e2;</i></div>';
                html += '</div>';
                html += '</div>';
            }
            $('#images').val(JSON.stringify(urls));
            $('#contentImages').html(html);
        }
        
        // 移除封面图
        window.removeCoverImage = function() {
            coverImages = [];
            updateCoverPreview();
        };
        
        // 移除内容图
        window.removeContentImage = function(imageId) {
            contentImages = contentImages.filter(function(img) {
                return img.id != imageId;
            });
            updateContentPreview();
        };

        $('#edit').click(function () {
            // 验证封面图
            if (coverImages.length === 0) {
                layer.msg('请选择封面图', {time: 1000});
                return false;
            }
            // 验证内容图
            if (contentImages.length === 0) {
                layer.msg('请选择图片', {time: 1000});
                return false;
            }
            
            const content = $("#editForm").serializeArray();
            let flag = 0;
            $.each(content, function (i, item) {
                let id = $('#' + content[i].name);
                let verify = id.data("verify");
                if (item['value'] == '' && verify != '') {
                    layer.msg(verify, {time: 1000});
                    id.focus();
                    flag = 1;
                    return false;
                } else {
                    flag = 0;
                }
            });
            if (!flag) {
                $.ajax({
                    type: 'POST',
                    url: '/adm/album/edit',
                    data: content,
                    dataType: 'json',
                    success: function (data) {
                        if (data.code == 1) {
                            layer.msg(data.msg, {time: 1000}, function () {
                                window.parent.location.reload();
                                layer_close();
                            });
                        } else {
                            layer.msg(data.msg, {time: 1000});
                            return false;
                        }
                    }
                });
                return false;
            }
        });
    });
</script>
<!--/请在上方写此页面业务相关的脚本-->
</body>
</html>
