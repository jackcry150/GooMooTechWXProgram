<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/>
    <title>新增知识</title>
</head>
<body>
<div class="page-container">
    <form class="form form-horizontal" id="editForm">
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">小程序：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <span class="select-box"><select class="select" name="app_code">
                    {foreach name="appCodeOptions" key="k" item="v"}<option value="{$k}" {if $selectedAppCode==$k}selected{/if}>{$v}</option>{/foreach}
                </select></span>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">标题：</label>
            <div class="formControls col-xs-8 col-sm-9"><input class="input-text" name="title" id="title" data-verify="标题不能为空"></div>
        </div>
        {if $hasAliases}
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">别名：</label>
            <div class="formControls col-xs-8 col-sm-9"><input class="input-text" name="aliases" id="aliases" placeholder="逗号分隔，如型号、简称、中英文名"></div>
        </div>
        {/if}
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">内容：</label>
            <div class="formControls col-xs-8 col-sm-9"><textarea class="textarea" style="height:320px;" name="content" id="content" data-verify="内容不能为空"></textarea></div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">状态：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <span class="select-box"><select class="select" name="status"><option value="1">启用</option><option value="2">停用</option></select></span>
            </div>
        </div>
        <div class="row cl"><div class="col-9 col-offset-3"><input class="btn btn-primary radius" id="submitBtn" type="button" value="提交"></div></div>
    </form>
</div>
<script src="/static/js/jquery.min.js"></script>
<script src="/static/layer/2.4/layer.js"></script>
<script src="/static/h-ui.admin/js/H-ui.admin.js"></script>
<script>
$('#submitBtn').click(function () {
    $.post('/adm/ai_knowledge/add', $('#editForm').serializeArray(), function (res) {
        if (res.code === 1) {
            layer.msg(res.msg, {time: 1000}, function () { window.parent.location.reload(); layer_close(); });
        } else {
            layer.msg(res.msg || '提交失败');
        }
    }, 'json');
});
</script>
</body>
</html>
