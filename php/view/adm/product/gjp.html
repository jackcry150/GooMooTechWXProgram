<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta content="webkit|ie-comp|ie-stand" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport"/>
    <link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/>
    <link href="/static/Hui-iconfont/1.0.8/iconfont.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/skin/default/skin.css" id="skin" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/style.css" rel="stylesheet" type="text/css"/>
    <script language="javascript" src="/static/laydate/laydate.js" type="text/javascript"></script>
    <title>商品同步</title>
</head>
<body>
<nav class="breadcrumb">
    <i class="Hui-iconfont">&#xe67f;</i> 首页
    <span class="c-gray en">&gt;</span> 商品管理
    <span class="c-gray en">&gt;</span> 商品同步
    <a class="btn btn-success radius r" href="javascript:location.replace(location.href);" style="line-height:1.6em;margin-top:3px" title="刷新"><i class="Hui-iconfont">&#xe68f;</i></a>
</nav>
<div class="page-container">
    <div class="text-c">
        <form action="/adm/product/gjp" id="searchForm" method="get">
            <input class="input-text" id="perPage" name="perPage" placeholder="默认20，最大值100" style="width:150px" type="number" value="{$perPage}">
            <input class="input-text" id="page" name="page" placeholder="页数" style="width:150px" type="number" value="{$page}">
            <input class="input-text" id="startTime" name="startTime" onClick="laydate({istime: true, format: 'YYYY-MM-DD hh:mm:ss'})" placeholder="商品修改开始时间" style="width:200px;" type="text"
                   value="{$startTime}">
            <input class="input-text" id="endTime" name="endTime" onClick="laydate({istime: true, format: 'YYYY-MM-DD hh:mm:ss'})" placeholder="商品修改结束时间" style="width:200px;" type="text"
                   value="{$endTime}">
            <button class="btn btn-success radius" type="submit"><i class="Hui-iconfont">&#xe665;</i> 搜索</button>
            <button class="btn btn-default radius ml-10" onclick="resetForm()" type="button">重置</button>
        </form>
    </div>
    <div class="mt-20">
        <table class="table table-border table-bordered table-hover table-bg">
            <thead>
            <tr class="text-c">
                <th>商品ID</th>
                <th>条形码</th>
                <th>商品全名</th>
                <th>商品简称</th>
                <th>商品型号</th>
                <th>商品价格</th>
                <th>商品是否停用</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            {if condition="empty($list)"}
            <tr class="text-c">
                <td colspan="8">暂无数据</td>
            </tr>
            {else /}
            {foreach name="list" item="v"}
            <tr class="text-c">
                <td>{$v.id}</td>
                <td>{$v.barcode}</td>
                <td class="text-l">{$v.fullname}</td>
                <td class="text-l">{$v.name}</td>
                <td>{$v.type}</td>
                <td>{$v.price|default='0.00'}</td>
                <td>{if condition="$v.isstop == 1"}停用{else /}启用{/if}</td>
                <td class="td-manage">
                    <a href="javascript:" onclick="show_html('同步','/adm/product/add?iidd={$v.id}&fullname={$v.fullname}&name={$v.name}&price={$v.price}')" style="text-decoration:none" title="同步">同步</a>
                </td>
            </tr>
            {/foreach}
            {/if}
            </tbody>
        </table>
    </div>
</div>
<!--_footer 作为公共模版分离出去-->
<script src="/static/js/jquery.min.js" type="text/javascript"></script>
<script src="/static/layer/2.4/layer.js" type="text/javascript"></script>
<script src="/static/h-ui/js/H-ui.min.js" type="text/javascript"></script>
<script src="/static/h-ui.admin/js/H-ui.admin.js" type="text/javascript"></script>
<!--/_footer 作为公共模版分离出去-->
<script>
    // 重置表单
    function resetForm() {
        $('#perPage').val(20);
        $('#page').val(1);
        $('#startTime').val('');
        $('#endTime').val('');
        $('#searchForm').submit();
    }

    // 验证每页数量
    $('#perPage').on('blur', function () {
        var val = parseInt($(this).val());
        if (val < 1) {
            $(this).val(20);
        } else if (val > 100) {
            $(this).val(100);
        }
    });

    // 验证页数
    $('#page').on('blur', function () {
        var val = parseInt($(this).val());
        if (val < 1) {
            $(this).val(1);
        }
    });
</script>
</body>
</html>
