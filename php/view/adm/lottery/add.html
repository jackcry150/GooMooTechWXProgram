<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta content="webkit|ie-comp|ie-stand" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport"/>
    <link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/>
    <link href="/static/Hui-iconfont/1.0.8/iconfont.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/skin/default/skin.css" id="skin" rel="stylesheet" type="text/css"/>
    <title>添加奖品</title>
</head>
<body>
<div class="page-container">
    <form class="form form-horizontal" id="addForm">
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">奖品名称：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="奖品名称不能为空" id="name" name="name" type="text" value="">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">奖品图片：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <button type="button" class="btn btn-primary radius" onclick="openGalleryModal()">选择图片</button>
                <div id="imagePreview" style="margin-top:10px;"></div>
                <input type="hidden" id="image" name="image" value="">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">奖励类型：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <span class="select-box">
                    <select class="select" id="rewardType" name="rewardType">
                        {foreach name="rewardType" key="k" item="v"}
                        <option value="{$k}">{$v}</option>
                        {/foreach}
                    </select>
                </span>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">奖励数值：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="rewardValue" name="rewardValue" type="number" min="0" value="0">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">权重：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="权重不能为空" id="weight" name="weight" type="number" min="1" value="1">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">库存：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="stock" name="stock" type="number" value="-1">
                <span class="c-999">`-1` 表示不限库存</span>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">状态：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <span class="select-box">
                    <select class="select" id="status" name="status">
                        {foreach name="statusType" key="k" item="v"}
                        <option value="{$k}">{$v}</option>
                        {/foreach}
                    </select>
                </span>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">排序：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="sort" name="sort" type="number" value="1">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">说明：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <textarea class="textarea" id="description" name="description" rows=""></textarea>
            </div>
        </div>
        <div class="row cl">
            <div class="col-9 col-offset-3">
                <input class="btn btn-primary radius" id="add" type="button" value="&nbsp;&nbsp;提交&nbsp;&nbsp;">
            </div>
        </div>
    </form>
</div>
{include file="public/gallery_selector" /}
<script src="/static/js/jquery.min.js" type="text/javascript"></script>
<script src="/static/layer/2.4/layer.js" type="text/javascript"></script>
<script src="/static/h-ui/js/H-ui.min.js" type="text/javascript"></script>
<script src="/static/h-ui.admin/js/H-ui.admin.js" type="text/javascript"></script>
<script>
    var selectedImage = null;
    $(function () {
        GallerySelector.init({ multiple: false });
        $('#add').click(function () {
            const content = $("#addForm").serializeArray();
            let flag = 0;
            $.each(content, function (i, item) {
                let id = $('#' + content[i].name);
                let verify = id.data("verify");
                if (item['value'] == '' && verify != '') {
                    layer.msg(verify, {time: 1000});
                    id.focus();
                    flag = 1;
                    return false;
                }
            });
            if (!flag) {
                $.post('/adm/lottery/add', content, function(data) {
                    if (data.code == 1) {
                        layer.msg(data.msg, {time: 1000}, function () {
                            window.parent.location.reload();
                            layer_close();
                        });
                    } else {
                        layer.msg(data.msg, {time: 1000});
                    }
                }, 'json');
            }
        });
    });
    function openGalleryModal() {
        GallerySelector.open(function(images) {
            if (images && images.length > 0) {
                selectedImage = images[0];
                $('#image').val(selectedImage.url);
                $('#imagePreview').html('<img src="' + selectedImage.url + '" style="max-width:160px;max-height:160px;border:1px solid #ddd;border-radius:4px;">');
            }
        });
    }
</script>
</body>
</html>
