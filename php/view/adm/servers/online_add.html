<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta content="webkit|ie-comp|ie-stand" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport"/>
    <link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/>
    <link href="/static/Hui-iconfont/1.0.8/iconfont.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/skin/default/skin.css" id="skin" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/style.css" rel="stylesheet" type="text/css"/>
    <style>
        .preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 10px;
        }

        .preview-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .preview-item2 {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .preview-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .preview-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
        }

        .preview-item:hover .preview-overlay {
            opacity: 1;
        }

        .action-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
        }

        .delete-btn {
            background: #e74c3c;
        }
    </style>
    <title>添加</title>
</head>
<body>
<div class="page-container">
    <form class="form form-horizontal" id="addForm">
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="title">标题：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="标题不能为空" id="title" name="title" type="text" value="">
            </div>
        </div>

        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">详情页客服：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <span class="select-box">
				<select class="select" data-verify="选择类型" id="type" name="type">
                    <option value="">选择类型</option>
                    {foreach name="serverType" key="k" item="v"}
                    <option value="{$k}">{$v}</option>
                {/foreach}
				</select>
				</span>
            </div>
        </div>

        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">图片：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <button type="button" class="btn btn-primary radius" onclick="openGalleryModal()">选择图片</button>
                <div class="preview-container" id="imagePreview" style="margin-top:10px;"></div>
                <input type="hidden" id="image" name="image" data-verify="图片不能为空">
            </div>
        </div>

        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="corpId">企业微信ID：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="corpId" name="corpId" type="text" value="">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="link">企业微信链接：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="企业微信链接不能为空" id="link" name="link" type="text" value="">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">状态：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <span class="select-box">
				<select class="select" data-verify="选择状态" id="status" name="status">
                    {foreach name="statusType" key="k" item="v"}
                    <option value="{$k}">{$v}</option>
                {/foreach}
				</select>
				</span>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">排序：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="排序不能为空" id="sort" name="sort" type="number" value="1">
                数字越大越靠前
            </div>
        </div>
        <div class="row cl">
            <div class="col-9 col-offset-3">
                <input class="btn btn-primary radius" id="add" type="button" value="&nbsp;&nbsp;提交&nbsp;&nbsp;">
            </div>
        </div>
    </form>
</div>
<!-- 引入图库选择器 -->
{include file="public/gallery_selector" /}
<!--_footer 作为公共模版分离出去-->
<script src="/static/js/jquery.min.js" type="text/javascript"></script>
<script src="/static/layer/2.4/layer.js" type="text/javascript"></script>
<script src="/static/h-ui/js/H-ui.min.js" type="text/javascript"></script>
<script src="/static/h-ui.admin/js/H-ui.admin.js" type="text/javascript"></script>
<!--/_footer 作为公共模版分离出去-->
<!--请在下方写此页面业务相关的脚本-->
<script type="text/javascript">
    // 选中的图片数组
    var selectedImages = [];
    
    // 初始化图库选择器
    $(function () {
        GallerySelector.init({
            multiple: true, // 多选模式
            maxSelect: 1 // 最多选择1张图片
        });
    });
    
    // 打开图库选择器
    function openGalleryModal() {
        GallerySelector.open(function(images) {
            if (images && images.length > 0) {
                selectedImages = images;
                updateImagePreview();
            }
        });
                }
    
    // 更新图片预览
    function updateImagePreview() {
        if (selectedImages.length > 0) {
            // 将图片URL数组转换为JSON字符串
            var imageUrls = selectedImages.map(function(img) {
                return img.url;
            });
            $('#image').val(JSON.stringify(imageUrls));
            
            // 显示预览
            var previewHtml = '';
            selectedImages.forEach(function(img, index) {
                previewHtml += '<div style="position:relative;display:inline-block;margin:5px;">';
                previewHtml += '<img src="' + img.url + '" style="max-width:200px;max-height:200px;border:1px solid #ddd;border-radius:4px;">';
                previewHtml += '<span style="position:absolute;top:-8px;right:-8px;background:#ff0000;color:#fff;border-radius:50%;width:20px;height:20px;line-height:20px;text-align:center;cursor:pointer;font-size:14px;" onclick="removeImage(' + index + ')" title="删除">×</span>';
                previewHtml += '</div>';
            });
            $('#imagePreview').html(previewHtml);
        } else {
            $('#image').val('');
            $('#imagePreview').html('');
        }
    }
    
    // 删除图片
    function removeImage(index) {
        selectedImages.splice(index, 1);
        updateImagePreview();
                                }

    $(function () {
        $('#add').click(function () {
            const content = $("#addForm").serializeArray();
            let flag = 0;
            $.each(content, function (i, item) {
                let id = $('#' + content[i].name);
                let verify = id.data("verify");
                if (item['value'] == '' && verify != '') {
                    layer.msg(verify, {time: 1000});
                    id.focus();
                    flag = 1;
                    return false;
                } else {
                    flag = 0;
                }
            });
            if (!flag) {
                $.ajax({
                    type: 'POST',
                    url: '/adm/servers/onlineAdd',
                    data: content,
                    dataType: 'json',
                    success: function (data) {
                        if (data.code == 1) {
                            layer.msg(data.msg, {time: 1000}, function () {
                                window.parent.location.reload();
                                layer_close();
                            });
                        } else {
                            layer.msg(data.msg, {time: 1000});
                            return false;
                        }
                    }
                });
                return false;
            }
        });
    });
</script>
<!--/请在上方写此页面业务相关的脚本-->
</body>
</html>
