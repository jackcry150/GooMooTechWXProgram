<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta content="webkit|ie-comp|ie-stand" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport"/>
    <link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/>
    <link href="/static/Hui-iconfont/1.0.8/iconfont.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/skin/default/skin.css" id="skin" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/style.css" rel="stylesheet" type="text/css"/>
    <title>图库图片管理</title>
    <style>
        .images-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            padding: 20px 0;
        }
        .image-item {
            position: relative;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
        }
        .image-item:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }
        .image-thumb {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            background: #f5f5f5;
        }
        .image-info {
            padding: 10px;
        }
        .image-name {
            font-size: 13px;
            color: #333;
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .image-category {
            font-size: 12px;
            color: #999;
        }
        .image-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: none;
            gap: 6px;
        }
        .image-item:hover .image-actions {
            display: flex;
        }
        .image-action-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
            text-decoration: none;
            transition: background 0.3s;
        }
        .image-action-btn:hover {
            background: rgba(255,0,0,0.8);
        }
        .empty-images {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-images-icon {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 16px;
        }
        .back-btn {
            margin-right: 10px;
        }
        @media (max-width: 768px) {
            .images-container {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }
            .image-thumb {
                height: 120px;
            }
        }
    </style>
</head>
<body>
<nav class="breadcrumb">
    <i class="Hui-iconfont">&#xe67f;</i> 首页
    <span class="c-gray en">&gt;</span> 图库管理
    <span class="c-gray en">&gt;</span> 图片管理
    <a class="btn btn-success radius r" href="javascript:location.replace(location.href);" style="line-height:1.6em;margin-top:3px" title="刷新"><i class="Hui-iconfont">&#xe68f;</i></a>
</nav>
<div class="page-container">
    <div class="text-c">
        <form action="" method="get">
            <a href="/adm/gallery/category" class="btn btn-default radius back-btn" title="返回相册列表">
                <i class="Hui-iconfont">&#xe66b;</i> 返回相册
            </a>
            <span class="select-box inline">
                <select class="select" id="categoryId" name="categoryId" onchange="this.form.submit()">
                    <option value="">全部分类</option>
                    {foreach name="categoryList" item="c"}
                    <option value="{$c.id}" {if $categoryId == $c.id} selected {/if} >{$c.categoryName}</option>
                    {/foreach}
                </select>
            </span>
            <input class="input-text" id="imageName" name="imageName" placeholder="图片名称" style="width:250px" type="text" value="{$imageName}">
            <button class="btn btn-success" id="" name="" type="submit"><i class="Hui-iconfont">&#xe665;</i> 搜索</button>
            <button class="btn btn-primary radius" name="action" onclick="show_html('添加图片','/adm/gallery/imageAdd')" type="button"><i class="Hui-iconfont">&#xe600;</i> 添加图片</button>
        </form>
    </div>
    <div class="mt-20">
        {if condition="empty($list)"}
        <div class="empty-images">
            <div class="empty-images-icon">
                <i class="Hui-iconfont">&#xe64d;</i>
            </div>
            <div>暂无图片</div>
        </div>
        {else /}
        <div class="images-container">
            {foreach name="list" item="v"}
            <div class="image-item" onclick="previewImage('{$v.imageUrl}', '{$v.imageName}')">
                <img src="{$v.imageUrl}" alt="{$v.imageName}" class="image-thumb" onerror="this.src='/static/images/default_avatar.jpg'">
                <div class="image-info">
                    <div class="image-name" title="{$v.imageName}">{$v.imageName}</div>
                    <div class="image-category">{$v.categoryName}</div>
                </div>
                <div class="image-actions" onclick="event.stopPropagation()">
                    <a href="javascript:" onclick="del({$v.id})" class="image-action-btn" title="删除">
                        <i class="Hui-iconfont">&#xe6e2;</i>
                    </a>
                </div>
            </div>
            {/foreach}
        </div>
        <div class="page mt-20">{$page}</div>
        {/if}
    </div>
</div>
<!--_footer 作为公共模版分离出去-->
<script src="/static/js/jquery.min.js" type="text/javascript"></script>
<script src="/static/layer/2.4/layer.js" type="text/javascript"></script>
<script src="/static/h-ui/js/H-ui.min.js" type="text/javascript"></script>
<script src="/static/h-ui.admin/js/H-ui.admin.js" type="text/javascript"></script>
<script src="/static/js/jquery.contextmenu.r2.js" type="text/javascript"></script>
<!--/_footer 作为公共模版分离出去-->

<!--请在下方写此页面业务相关的脚本-->
<script type="text/javascript">
    // 预览图片
    function previewImage(url, name) {
        layer.photos({
            photos: {
                "title": name,
                "data": [{
                    "alt": name,
                    "pid": 1,
                    "src": url,
                    "thumb": url
                }]
            },
            anim: 5
        });
    }
    
    // 删除图片
    function del(id) {
        layer.confirm('确认要删除吗？', function (index) {
            $.ajax({
                type: 'POST',
                url: '/adm/gallery/imageDel',
                data: {id: id},
                dataType: 'json',
                success: function (data) {
                    if (data.code == 1) {
                        layer.msg(data.msg, {time: 1000}, function () {
                            location.reload();
                        });
                    } else {
                        layer.msg(data.msg, {time: 2000});
                    }
                }
            });
            layer.close(index);
        });
    }
</script>
<!--/请在上方写此页面业务相关的脚本-->
</body>
</html>
