<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta content="webkit|ie-comp|ie-stand" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport"/>
    <link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/>
    <link href="/static/Hui-iconfont/1.0.8/iconfont.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/skin/default/skin.css" id="skin" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/style.css" rel="stylesheet" type="text/css"/>
    <title>图库分类管理</title>
    <style>
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }
        .gallery-item {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .gallery-item:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }
        .gallery-cover {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: #f5f5f5;
        }
        .gallery-info {
            padding: 12px;
        }
        .gallery-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .gallery-count {
            font-size: 12px;
            color: #999;
        }
        .gallery-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: none;
            gap: 8px;
        }
        .gallery-item:hover .gallery-actions {
            display: flex;
        }
        .gallery-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            transition: background 0.3s;
        }
        .gallery-action-btn:hover {
            background: rgba(0,0,0,0.8);
        }
        .empty-gallery {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-gallery-icon {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 16px;
        }
        @media (max-width: 768px) {
            .gallery-container {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            .gallery-cover {
                height: 150px;
            }
        }
    </style>
</head>
<body>
<nav class="breadcrumb">
    <i class="Hui-iconfont">&#xe67f;</i> 首页
    <span class="c-gray en">&gt;</span> 图库管理
    <span class="c-gray en">&gt;</span> 图库分类管理
    <a class="btn btn-success radius r" href="javascript:location.replace(location.href);" style="line-height:1.6em;margin-top:3px" title="刷新"><i class="Hui-iconfont">&#xe68f;</i></a>
</nav>
<div class="page-container">
    <div class="text-c">
        <form action="/adm/gallery/category" method="get">
            <input type="text" name="categoryName" id="categoryName" placeholder="分类名称" style="width:250px" class="input-text" value="{$categoryName}">
            <button name="" id="" class="btn btn-success" type="submit"><i class="Hui-iconfont">&#xe665;</i> 搜索</button>
            <a class="btn btn-primary radius" href="javascript:" onclick="show_html('添加分类','/adm/gallery/categoryAdd')"><i class="Hui-iconfont">&#xe600;</i> 添加分类</a>
        </form>
    </div>
    <div class="mt-20">
        {if condition="empty($list)"}
        <div class="empty-gallery">
            <div class="empty-gallery-icon">
                <i class="Hui-iconfont">&#xe64d;</i>
            </div>
            <div>暂无分类，请先添加分类</div>
        </div>
        {else /}
        <div class="gallery-container">
            {foreach name="list" item="v"}
            <div class="gallery-item" onclick="viewImages({$v.id}, '{$v.categoryName}')">
                <img src="{$v.coverImage}" alt="{$v.categoryName}" class="gallery-cover" onerror="this.src='/static/images/default_avatar.jpg'">
                <div class="gallery-info">
                    <div class="gallery-name" title="{$v.categoryName}">{$v.categoryName}</div>
                    <div class="gallery-count">共 {$v.imageCount} 张图片</div>
                </div>
                <div class="gallery-actions" onclick="event.stopPropagation()">
                    <a href="javascript:" onclick="editCategory({$v.id})" class="gallery-action-btn" title="编辑">
                        <i class="Hui-iconfont">&#xe6df;</i>
                    </a>
                    <a href="javascript:" onclick="del({$v.id})" class="gallery-action-btn" title="删除">
                        <i class="Hui-iconfont">&#xe6e2;</i>
                    </a>
                </div>
            </div>
            {/foreach}
        </div>
        <div class="page mt-20">{$page}</div>
        {/if}
    </div>
</div>
<!--_footer 作为公共模版分离出去-->
<script src="/static/js/jquery.min.js" type="text/javascript"></script>
<script src="/static/layer/2.4/layer.js" type="text/javascript"></script>
<script src="/static/h-ui/js/H-ui.min.js" type="text/javascript"></script>
<script src="/static/h-ui.admin/js/H-ui.admin.js" type="text/javascript"></script>
<script src="/static/js/jquery.contextmenu.r2.js" type="text/javascript"></script>
<!--/_footer 作为公共模版分离出去-->

<!--请在下方写此页面业务相关的脚本-->
<script type="text/javascript">
    // 查看相册中的图片
    function viewImages(categoryId, categoryName) {
        location.href = '/adm/gallery/image?categoryId=' + categoryId;
    }
    
    // 编辑分类
    function editCategory(id) {
        show_html('编辑分类', '/adm/gallery/categoryEdit?id=' + id);
    }
    
    // 删除分类
    function del(id) {
        layer.confirm('确认要删除吗？', function(index) {
            $.ajax({
                type: 'POST',
                url: '/adm/gallery/categoryDel',
                data: {id: id},
                dataType: 'json',
                success: function(data) {
                    if (data.code == 1) {
                        layer.msg(data.msg, {time: 1000}, function() {
                            location.reload();
                        });
                    } else {
                        layer.msg(data.msg, {time: 2000});
                    }
                }
            });
            layer.close(index);
        });
    }
</script>
<!--/请在上方写此页面业务相关的脚本-->
</body>
</html>
