<!DOCTYPE HTML>
<html>
<head>
<meta charset="utf-8">
<meta name="renderer" content="webkit|ie-comp|ie-stand">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" />
<link rel="stylesheet" type="text/css" href="/static/h-ui/css/H-ui.min.css" />
<link rel="stylesheet" type="text/css" href="/static/h-ui.admin/css/H-ui.admin.css" />
<link rel="stylesheet" type="text/css" href="/static/Hui-iconfont/1.0.8/iconfont.css" />
<link rel="stylesheet" type="text/css" href="/static/h-ui.admin/skin/default/skin.css" id="skin" />
<link rel="stylesheet" type="text/css" href="/static/h-ui.admin/css/style.css" />
<title>添加导航栏</title>
</head>
<body>
<div class="page-container">
	<form class="form form-horizontal" >
		<div class="row cl">
			<label class="form-label col-xs-4 col-sm-3">上级栏目：</label>
			<div class="formControls col-xs-8 col-sm-9"> <span class="select-box">
				<select class="select" data-tip="上级栏目" id="navId" name="navId">
					<option value="0">顶级分类</option>
					{foreach name="list" item="v"}
					<option value="{$v.id}">{$v.name}</option>
					{/foreach}
				</select>
				</span> </div>
			<div class="col-3"> </div>
		</div>
		<div class="row cl">
			<label class="form-label col-xs-4 col-sm-3">名称：</label>
			<div class="formControls col-xs-8 col-sm-9">
				<input type="text" class="input-text" value="" placeholder="" data-tip="名称" id="name" name="name">
			</div>
			<div class="col-3"> </div>
		</div>
		<div class="row cl">
			<label class="form-label col-xs-4 col-sm-3">连接地址：</label>
			<div class="formControls col-xs-8 col-sm-9">
				<input type="text" class="input-text" value="" placeholder="" data-tip="连接地址" id="url" name="url">
			</div>
			<div class="col-3"> </div>
		</div>
		<div class="row cl">
			<div class="col-9 col-offset-3">
				<input class="btn btn-primary radius" id="form_submit" type="button" value="&nbsp;&nbsp;提交&nbsp;&nbsp;">
			</div>
		</div>
	</form>
</div>

<!--_footer 作为公共模版分离出去--> 
<script type="text/javascript" src="/static/js/jquery.min.js"></script> 
<script type="text/javascript" src="/static/layer/2.4/layer.js"></script> 
<script type="text/javascript" src="/static/h-ui/js/H-ui.min.js"></script> 
<script type="text/javascript" src="/static/h-ui.admin/js/H-ui.admin.js"></script> 
<script type="text/javascript" src="/static/js/jquery.contextmenu.r2.js"></script> <!--/_footer 作为公共模版分离出去--> 

<!--请在下方写此页面业务相关的脚本--> 
<script type="text/javascript">
$(function() {
$('#form_submit').click(function() {
	var content = $("form").serializeArray();
	$.each(content,function(i,item){
		if(item['value'] == '') {
			layer.msg($('#'+content[i].name).data("tip")+'不能为空！',{time: 1000});
			$('#'+content[i].name).focus();
			flag = 1;
			return false;
		}else{
			flag = 0;
		}
	});
	if(!flag){
		$.ajax({
		type: 'POST',
		url: '/adm/system/navAdd',
		data: content,
		dataType: 'json',
		success:function (data) {
			if(data.code == 1){
				layer.msg(data.msg,{time:1000}, function(){
					layer.closeAll();
				});
			}else{
				layer.msg(data.msg,{time:1000});
				return false;
			}
		}
	});
	return false;
	}
});
});
</script> 
<!--/请在上方写此页面业务相关的脚本-->
</body>
</html>
