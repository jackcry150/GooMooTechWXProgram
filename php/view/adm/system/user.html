<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta content="webkit|ie-comp|ie-stand" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport"/>
    <link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/>
    <link href="/static/Hui-iconfont/1.0.8/iconfont.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/skin/default/skin.css" rel="stylesheet" type="text/css"/>
    <title>管理员列表</title>
</head>
<body>
<nav class="breadcrumb">
    <i class="Hui-iconfont">&#xe67f;</i> 首页
    <span class="c-gray en">&gt;</span> 系统管理
    <span class="c-gray en">&gt;</span> 管理员列表
    <a class="btn btn-success radius r" href="javascript:location.replace(location.href);" style="line-height:1.6em;margin-top:3px" title="刷新"><i class="Hui-iconfont">&#xe68f;</i></a>
</nav>
<div class="page-container">
    <div class="cl pd-5 bg-1 bk-gray">
		<span class="l">
			<a class="btn btn-primary radius" href="javascript:" onclick="show_html('添加管理员','/adm/system/userAdd')"><i class="Hui-iconfont">&#xe600;</i> 添加管理员</a>
		</span>
    </div>
    <div class="text-c pd-5">
        <form action="" method="get">
			<span class="select-box inline">
			<select class="select" data-tip="部门" id="department" name="department">
				<option selected value="">请选择部门</option>
				{foreach name="departmentList" item="v"}
				<option $department== $v.id} selected value="{$v.id}" { {if/if}>{$v.name}</option>
                {/foreach}
			</select>
			</span>
            <input class="input-text" name="name" placeholder="输入管理员姓名" style="width:150px" type="text" value="{$name}">
            <button class="btn btn-success radius" type="submit"><i class="Hui-iconfont">&#xe665;</i> 搜索</button>
        </form>
    </div>
    <div class="mt-20">
        <table class="table table-border table-bordered table-hover table-bg table-sort">
            <thead>
            <tr class="text-c">
                <th>编号</th>
                <th>姓名</th>
                <th>手机</th>
                <th>QQ</th>
                <th>微信</th>
                <th>部门</th>
                <th>添加时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>

            {foreach name="list" item="v"}
            <tr class="text-c">
                <td>{$v.id}</td>
                <td>{$v.name}</td>
                <td>{$v.phone}</td>
                <td>{$v.qq}</td>
                <td>{$v.weixin}</td>
                <td>{$v.departmentName}</td>
                <td>{$v.add_time}</td>
                <td class="td-manage"><a href="javascript:" onClick="show_html('修改管理员','/adm/system/userEdit?id={$v.id}')" title="修改">修改</a>&nbsp;|&nbsp;
                    <a href="javascript:" onClick="show_html('修改密码','/adm/system/userPassword?id={$v.id}')" title="修改密码">密码</a>&nbsp;|&nbsp;
                    <a href="javascript:" onclick="del(this,'{$v.id}')" title="删除">删除</a>
                </td>
            </tr>
            {/foreach}
            </tbody>

        </table>
        <div class="pages">{$page|raw}
            <div style="clear:both;"></div>
        </div>
    </div>
</div>
<!--_footer 作为公共模版分离出去-->
<script src="/static/js/jquery.min.js" type="text/javascript"></script>
<script src="/static/layer/2.4/layer.js" type="text/javascript"></script>
<script src="/static/h-ui/js/H-ui.min.js" type="text/javascript"></script>
<script src="/static/h-ui.admin/js/H-ui.admin.js" type="text/javascript"></script>
<!--/_footer 作为公共模版分离出去-->
<script>
    function del(obj, id) {
        layer.confirm('确认要删除吗？', function (index) {
            $.ajax({
                type: 'POST',
                url: '/adm/system/userDel',
                data: {'id': id},
                dataType: 'json',
                success: function (data) {
                    if (data.code == 1) {
                        $(obj).parents("tr").remove();
                        layer.msg(data.msg, {time: 1000});
                    } else {
                        layer.msg(data.msg, {time: 1000});
                        return false;
                    }
                }
            });
        });
    }
</script>
</body>
</html>
