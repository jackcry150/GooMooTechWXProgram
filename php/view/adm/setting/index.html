<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta content="webkit|ie-comp|ie-stand" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport"/>
    <link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/>
    <link href="/static/Hui-iconfont/1.0.8/iconfont.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/skin/default/skin.css" rel="stylesheet" type="text/css"/>
    <title>设置</title>
</head>
<body>
<nav class="breadcrumb">
    <i class="Hui-iconfont">&#xe67f;</i> 首页
    <span class="c-gray en">&gt;</span> 设置管理
    <span class="c-gray en">&gt;</span> 设置
    <a class="btn btn-success radius r" href="javascript:location.replace(location.href);" style="line-height:1.6em;margin-top:3px" title="刷新"><i class="Hui-iconfont">&#xe68f;</i></a>
</nav>
<div class="page-container">
    <div class="text-c" style="margin-bottom: 20px;">
        <form action="" method="get">
            <span class="select-box inline" style="width: 220px;">
                <select class="select" id="app_code" name="app_code" onchange="this.form.submit()">
                    {foreach name="appCodeOptions" key="k" item="v"}
                    <option value="{$k}" {if $k == $app_code}selected{/if}>{$v}</option>
                    {/foreach}
                </select>
            </span>
        </form>
    </div>
    <form class="form form-horizontal" id="editForm">
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3">当前小程序：</label>
            <div class="formControls col-xs-8 col-sm-9" style="padding-top: 3px;">
                <span class="label label-primary radius">{$currentAppCodeName}</span>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="name">网址名称：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="网址名称不能为空" id="name" name="name" type="text" value="{$info.name|default=''}">
            </div>
        </div>

        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="link">网址：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="网址不能为空" id="link" name="link" placeholder="" type="text" value="{$info.link|default=''}">
            </div>
        </div>

        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="contactUs">联系我们：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <textarea class="textarea" cols="" data-verify="联系我们不能为空" id="contactUs" name="contactUs" rows="">{$info.contactUs|default=''}</textarea>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="address">公司地址：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="公司地址不能为空" id="address" name="address" placeholder="" type="text" value="{$info.address|default=''}">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="address">公司邮箱：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="公司邮箱不能为空" id="email" name="email" placeholder="" type="text" value="{$info.email|default=''}">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="lotteryCost">单次抽奖消耗积分：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="抽奖消耗不能为空" id="lotteryCost" name="lotteryCost" type="number" min="1" value="{$info.lotteryCost|default='10'}">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="lotteryRule">抽奖规则：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <textarea class="textarea" id="lotteryRule" name="lotteryRule" rows="">{$info.lotteryRule|default=''}</textarea>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="wechatMiniAppId">小程序 AppID：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="wechatMiniAppId" name="wechatMiniAppId" type="text" value="{$info.wechatMiniAppId|default=''}" placeholder="微信小程序 AppID">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="wechatMiniSecret">小程序 Secret：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="wechatMiniSecret" name="wechatMiniSecret" type="password" value="{$info.wechatMiniSecret|default=''}" placeholder="微信小程序 Secret" autocomplete="new-password">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="huifuMerchantId">汇付商户号：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="huifuMerchantId" name="huifuMerchantId" type="text" value="{$info.huifuMerchantId|default=''}" placeholder="款项进入该商户号绑定的结算账户">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="huifuNotifyUrl">支付回调地址：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="huifuNotifyUrl" name="huifuNotifyUrl" type="text" value="{$info.huifuNotifyUrl|default=''}" placeholder="例如：https://api.example.com/api/order/notify">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="paymentSplitEnabled">启用支付分账：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <span class="select-box">
                    <select class="select" id="paymentSplitEnabled" name="paymentSplitEnabled">
                        <option value="0" {if condition="($info['paymentSplitEnabled'] ?? 0) == 0"}selected{/if}>否，全部入账到本商户</option>
                        <option value="1" {if condition="($info['paymentSplitEnabled'] ?? 0) == 1"}selected{/if}>是，按商品分账字段分润</option>
                    </select>
                </span>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="snailShellsDiscountEnabled">启用积分抵扣：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <span class="select-box">
                    <select class="select" id="snailShellsDiscountEnabled" name="snailShellsDiscountEnabled">
                        <option value="1" {if condition="($info['snailShellsDiscountEnabled'] ?? 1) == 1"}selected{/if}>是，允许下单抵扣</option>
                        <option value="0" {if condition="($info['snailShellsDiscountEnabled'] ?? 1) == 0"}selected{/if}>否，暂不允许抵扣</option>
                    </select>
                </span>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="snailShellsExchangeRate">积分兑换比例：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="snailShellsExchangeRate" name="snailShellsExchangeRate" type="number" min="1" value="{$info.snailShellsExchangeRate|default=10}" placeholder="默认 10，表示 10 积分抵 1 元">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="snailShellsDiscountPercent">单笔抵扣上限：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" id="snailShellsDiscountPercent" name="snailShellsDiscountPercent" type="number" min="0" max="100" step="0.01" value="{$info.snailShellsDiscountPercent|default=20}" placeholder="订单金额百分比，默认 20">
            </div>
        </div>

        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="huifuPrivateKey">汇付私钥：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <textarea class="textarea" id="huifuPrivateKey" name="huifuPrivateKey" rows="" placeholder="支持填入 PEM 私钥或去掉头尾后的 base64 私钥">{$info.huifuPrivateKey|default=''}</textarea>
            </div>
        </div>

        <div class="row cl">
            <div class="col-9 col-offset-3">
                <input name="id" type="hidden" value="{$info.id|default=''}"/>
                <input name="app_code" type="hidden" value="{$app_code}"/>
                <input class="btn btn-primary radius" id="edit" type="button" value="&nbsp;&nbsp;提交&nbsp;&nbsp;">
            </div>
        </div>
    </form>
</div>
<!--_footer 作为公共模版分离出去-->
<script src="/static/js/jquery.min.js" type="text/javascript"></script>
<script src="/static/layer/2.4/layer.js" type="text/javascript"></script>
<script src="/static/h-ui/js/H-ui.min.js" type="text/javascript"></script>
<script src="/static/h-ui.admin/js/H-ui.admin.js" type="text/javascript"></script>
<!--/_footer 作为公共模版分离出去-->
<script type="text/javascript">
    $(function () {
        $('#edit').click(function () {
            const content = $("#editForm").serializeArray();
            let flag = 0;
            $.each(content, function (i, item) {
                let id = $('#' + content[i].name);
                let verify = id.data("verify");
                if (item['value'] == '' && verify) {
                    layer.msg(verify, {time: 1000});
                    id.focus();
                    flag = 1;
                    return false;
                } else {
                    flag = 0;
                }
            });
            if (!flag) {
                $.ajax({
                    type: 'POST',
                    url: '/adm/setting/edit',
                    data: content,
                    dataType: 'json',
                    success: function (data) {
                        layer.msg(data.msg, {time: 1000});
                        return false;
                    },
                    error: function () {
                        layer.msg('提交失败，请稍后重试', {time: 1500});
                        return false;
                    }
                });
                return false;
            }
        });
    });
</script>
</body>
</html>
