<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta content="webkit|ie-comp|ie-stand" name="renderer">
    <meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" name="viewport"/>
    <link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/>
    <link href="/static/Hui-iconfont/1.0.8/iconfont.css" rel="stylesheet" type="text/css"/>
    <link href="/static/h-ui.admin/skin/default/skin.css" rel="stylesheet" type="text/css"/>
    <title>设置</title>
</head>
<body>
<nav class="breadcrumb">
    <i class="Hui-iconfont">&#xe67f;</i> 首页
    <span class="c-gray en">&gt;</span> 设置管理
    <span class="c-gray en">&gt;</span> 设置
    <a class="btn btn-success radius r" href="javascript:location.replace(location.href);" style="line-height:1.6em;margin-top:3px" title="刷新"><i class="Hui-iconfont">&#xe68f;</i></a>
</nav>
<div class="page-container">
    <form class="form form-horizontal" id="editForm">
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="name">网址名称：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="网址名称不能为空" id="name" name="name" type="text" value="{$info.name}">
            </div>
        </div>

        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="link">网址：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="网址不能为空" id="link" name="link" placeholder="" type="text" value="{$info.link}">
            </div>
        </div>

        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="contactUs">联系我们：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <textarea class="textarea" cols="" data-verify="联系我们不能为空" id="contactUs" name="contactUs" rows="">{$info.contactUs}</textarea>
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="address">公司地址：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="公司地址不能为空" id="address" name="address" placeholder="" type="text" value="{$info.address}">
            </div>
        </div>
        <div class="row cl">
            <label class="form-label col-xs-4 col-sm-3" for="address">公司邮箱：</label>
            <div class="formControls col-xs-8 col-sm-9">
                <input class="input-text" data-verify="公司邮箱不能为空" id="email" name="email" placeholder="" type="text" value="{$info.email}">
            </div>
        </div>

        <div class="row cl">
            <div class="col-9 col-offset-3">
                <input name="id" type="hidden" value="{$info.id}"/>
                <input class="btn btn-primary radius" id="edit" type="button" value="&nbsp;&nbsp;提交&nbsp;&nbsp;">
            </div>
        </div>
    </form>
</div>
<!--_footer 作为公共模版分离出去-->
<script src="/static/js/jquery.min.js" type="text/javascript"></script>
<script src="/static/layer/2.4/layer.js" type="text/javascript"></script>
<script src="/static/h-ui/js/H-ui.min.js" type="text/javascript"></script>
<script src="/static/h-ui.admin/js/H-ui.admin.js" type="text/javascript"></script>
<!--/_footer 作为公共模版分离出去-->
<script type="text/javascript">
    $(function () {
        $('#edit').click(function () {
            const content = $("#editForm").serializeArray();
            let flag = 0;
            $.each(content, function (i, item) {
                let id = $('#' + content[i].name);
                let verify = id.data("verify");
                if (item['value'] == '' && verify != '') {
                    layer.msg(verify, {time: 1000});
                    id.focus();
                    flag = 1;
                    return false;
                } else {
                    flag = 0;
                }
            });
            if (!flag) {
                $.ajax({
                    type: 'POST',
                    url: '/adm/setting/edit',
                    data: content,
                    dataType: 'json',
                    success: function (data) {
                        layer.msg(data.msg, {time: 1000});
                        return false;
                    }
                });
                return false;
            }
        });
    });
</script>
</body>
</html>
