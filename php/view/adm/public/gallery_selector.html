<!-- 图库选择器公共样式 -->
<style>
    .gallery-modal {
        display: none;
        position: fixed;
        z-index: 10000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.5);
    }

    .gallery-modal-content {
        background-color: #fefefe;
        margin: 5% auto;
        padding: 20px;
        border: 1px solid #888;
        width: 90%;
        max-width: 1200px;
        max-height: 80vh;
        overflow-y: auto;
        border-radius: 8px;
    }

    .gallery-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid #ddd;
    }

    .gallery-filter {
        margin-bottom: 20px;
    }

    .gallery-images {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 15px;
    }

    .gallery-image-item {
        position: relative;
        border: 2px solid #ddd;
        border-radius: 8px;
        overflow: hidden;
        cursor: pointer;
    }

    .gallery-image-item:hover {
        border-color: #1ab394;
    }

    .gallery-image-item.selected {
        border-color: #1ab394;
        background: #e8f5e9;
    }

    .gallery-image-item img {
        width: 100%;
        height: 150px;
        object-fit: cover;
    }

    .gallery-image-name {
        padding: 5px;
        font-size: 12px;
        text-align: center;
        background: #f5f5f5;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    
    .gallery-pagination {
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid #eee;
    }
    
    .gallery-pagination button {
        padding: 5px 12px;
        font-size: 14px;
    }
    
    .gallery-pagination input {
        vertical-align: middle;
    }
</style>

<!-- 图库选择器JS文件 -->
<script src="/static/js/gallery-selector.js"></script>
