<!DOCTYPE HTML>
<html>
<head><meta charset="utf-8"><meta content="width=device-width,initial-scale=1" name="viewport"/><link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/><link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/><link href="/static/Hui-iconfont/1.0.8/iconfont.css" rel="stylesheet" type="text/css"/><title>安全日志</title></head>
<body>
<nav class="breadcrumb"><i class="Hui-iconfont">&#xe67f;</i> 首页 <span class="c-gray en">&gt;</span> AI客服 <span class="c-gray en">&gt;</span> 安全日志 <a class="btn btn-success radius r" href="javascript:location.replace(location.href);" style="line-height:1.6em;margin-top:3px" title="刷新"><i class="Hui-iconfont">&#xe68f;</i></a></nav>
<div class="page-container">
    <div class="text-c"><form action="" method="get"><span class="select-box inline" style="width:130px;"><select class="select" name="app_code"><option value="">全部小程序</option>{foreach name="appCodeOptions" key="k" item="v"}<option value="{$k}" {if $app_code==$k}selected{/if}>{$v}</option>{/foreach}</select></span><span class="select-box inline" style="width:120px;"><select class="select" name="action"><option value="">全部动作</option><option value="allow" {if $action=='allow'}selected{/if}>allow</option><option value="block" {if $action=='block'}selected{/if}>block</option><option value="transfer" {if $action=='transfer'}selected{/if}>transfer</option><option value="rate_limit" {if $action=='rate_limit'}selected{/if}>rate_limit</option></select></span><input class="input-text" name="category" placeholder="分类" style="width:120px" type="text" value="{$category}"><input class="input-text" name="keyword" placeholder="问题/回复/命中词" style="width:200px" type="text" value="{$keyword}"><button class="btn btn-success radius" type="submit"><i class="Hui-iconfont">&#xe665;</i> 搜索</button></form></div>
    <div class="mt-10"><table class="table table-border table-bordered table-hover table-bg"><thead><tr class="text-c"><th>ID</th><th>时间</th><th>小程序</th><th>用户</th><th>场景</th><th>阶段</th><th>动作</th><th>命中词</th><th>分类</th><th>问题</th><th>回复</th><th>来源</th></tr></thead><tbody>{foreach name="list" item="v"}<tr class="text-c"><td>{$v.id}</td><td>{$v.createTime}</td><td>{$v.app_code}</td><td>{$v.userId}</td><td>{$v.scene}</td><td>{$v.checkStage}</td><td>{$v.finalAction}</td><td>{$v.hitWords}</td><td>{$v.category}</td><td class="text-l">{$v.question}</td><td class="text-l">{$v.reply}</td><td>{$v.retrievalSourceIds}</td></tr>{/foreach}</tbody></table><div class="page-bootstrap">{$page|raw}</div></div>
</div>
<script src="/static/js/jquery.min.js"></script><script src="/static/layer/2.4/layer.js"></script><script src="/static/h-ui.admin/js/H-ui.admin.js"></script>
</body></html>
