<!DOCTYPE HTML>
<html><head><meta charset="utf-8"><link href="/static/h-ui/css/H-ui.min.css" rel="stylesheet" type="text/css"/><link href="/static/h-ui.admin/css/H-ui.admin.css" rel="stylesheet" type="text/css"/><title>编辑敏感词</title></head>
<body><div class="page-container"><form class="form form-horizontal" id="editForm"><input type="hidden" name="id" value="{$info.id}">
<div class="row cl"><label class="form-label col-xs-4 col-sm-3">小程序：</label><div class="formControls col-xs-8 col-sm-9"><span class="select-box"><select class="select" name="app_code">{foreach name="appCodeOptions" key="k" item="v"}<option value="{$k}" {if $selectedAppCode==$k}selected{/if}>{$v}</option>{/foreach}</select></span></div></div>
<div class="row cl"><label class="form-label col-xs-4 col-sm-3">敏感词：</label><div class="formControls col-xs-8 col-sm-9"><input class="input-text" name="word" value="{$info.word}"></div></div>
<div class="row cl"><label class="form-label col-xs-4 col-sm-3">分类：</label><div class="formControls col-xs-8 col-sm-9"><input class="input-text" name="category" value="{$info.category}"></div></div>
<div class="row cl"><label class="form-label col-xs-4 col-sm-3">等级：</label><div class="formControls col-xs-8 col-sm-9"><span class="select-box"><select class="select" name="level"><option value="1" {if $info.level==1}selected{/if}>1 普通</option><option value="2" {if $info.level==2}selected{/if}>2 高风险</option></select></span></div></div>
<div class="row cl"><label class="form-label col-xs-4 col-sm-3">动作：</label><div class="formControls col-xs-8 col-sm-9"><span class="select-box"><select class="select" name="action"><option value="block" {if $info.action=='block'}selected{/if}>阻断</option><option value="transfer" {if $info.action=='transfer'}selected{/if}>转人工</option><option value="allow" {if $info.action=='allow'}selected{/if}>仅记录</option></select></span></div></div>
<div class="row cl"><label class="form-label col-xs-4 col-sm-3">状态：</label><div class="formControls col-xs-8 col-sm-9"><span class="select-box"><select class="select" name="status"><option value="1" {if $info.status==1}selected{/if}>启用</option><option value="2" {if $info.status==2}selected{/if}>停用</option></select></span></div></div>
<div class="row cl"><label class="form-label col-xs-4 col-sm-3">备注：</label><div class="formControls col-xs-8 col-sm-9"><textarea class="textarea" name="remark">{$info.remark}</textarea></div></div>
<div class="row cl"><div class="col-9 col-offset-3"><input class="btn btn-primary radius" id="submitBtn" type="button" value="提交"></div></div>
</form></div><script src="/static/js/jquery.min.js"></script><script src="/static/layer/2.4/layer.js"></script><script src="/static/h-ui.admin/js/H-ui.admin.js"></script><script>$('#submitBtn').click(function(){ $.post('/adm/ai_safety/wordEdit',$('#editForm').serializeArray(),function(res){ if(res.code==1){ layer.msg(res.msg,{time:1000},function(){ window.parent.location.reload(); layer_close();}); } else { layer.msg(res.msg || '提交失败'); }},'json'); });</script></body></html>
