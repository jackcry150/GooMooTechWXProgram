services:
  nginx:
    image: nginx:1.18
    container_name: nginx-prod
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ../php/public:/var/www/html/public
    depends_on:
      - php
    networks:
      - app-network

  php:
    build:
      context: ./
      dockerfile: Dockerfile
    image: shanghaicatjump-prod-php:latest
    container_name: php-prod
    volumes:
      - ../php:/var/www/html
    expose:
      - "9000"
    networks:
      - app-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-prod
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY:-change-this-qdrant-key}"
    volumes:
      - /data/qdrant/storage:/qdrant/storage
    expose:
      - "6333"
      - "6334"
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql-prod
    ports:
    - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Root@123456
      MYSQL_DATABASE: root
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
